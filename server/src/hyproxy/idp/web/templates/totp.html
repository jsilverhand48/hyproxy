{% extends "base.html" %}
{% block title %}Verification code{% endblock %}
{% block content %}
<img class="pagemascot" src="/static/img/planet.gif" width="40" height="40" alt="">
<h1>Enter your code</h1>
<p>Enter the 6-digit code from your authenticator app.</p>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="/auth/totp">
  <input type="hidden" name="flow" value="{{ flow_id }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
  <label for="code">Code</label>
  <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code"
         pattern="[0-9]*" required autofocus>
  <button type="submit">Verify</button>
</form>
<p><a href="/auth/recovery?flow={{ flow_id }}">Use a recovery code instead</a></p>
{% endblock %}
